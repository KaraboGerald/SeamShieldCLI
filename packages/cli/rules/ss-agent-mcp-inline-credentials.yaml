id: ss/agent/mcp-inline-credentials
severity: high
title: Inline credential in MCP server configuration
description: >
  An MCP configuration file passes a literal credential value instead of an
  environment variable reference. MCP configs are commonly committed and
  shared between machines, leaking the credential with them.
framework_ref: AI_AGENT_DROP_IN.md#default-security-stance
check:
  type: regex
  redact: true
  include:
    basenames: [".mcp.json", "mcp.json", "claude_desktop_config.json"]
  patterns:
    - name: inline-mcp-credential
      regex: "\"[A-Z0-9_]*(?:KEY|TOKEN|SECRET|PASSWORD)[A-Z0-9_]*\"\\s*:\\s*\"(?![$]|\\$\\{)[^\"]{12,}\""
    - name: inline-mcp-secret-flag
      regex: '"--(?:api[-_]?key|token|secret|password)(?:=|\s+)(?![$]|\$\{)[^"]{12,}"'
    - name: inline-mcp-secret-env-arg
      regex: '"[A-Z0-9_]*(?:KEY|TOKEN|SECRET|PASSWORD)[A-Z0-9_]*=(?![$]|\$\{)[^"]{12,}"'
fix:
  summary: Reference MCP credentials via ${ENV_VAR} and set them in the environment instead.
  agent_prompt: >
    Replace literal MCP env values and command arguments with
    environment-variable references (for example "${GITHUB_TOKEN}") and
    document the variable in the project README or .env.example. If this
    config file was committed with the real value, tell the user to rotate
    the credential.
